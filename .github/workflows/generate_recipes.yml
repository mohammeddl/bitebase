name: Automated Recipe Generation

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate 20 Recipes
        run: |
          # We loop 5 times and call the "Generate 1" API
          # This avoids the 10-second Vercel timeout because each request is independent.
          # REDUCED TO 5: This saves your strict 20 Request-Per-Day limit so site visitors can still use the AI Chef!
          for i in {1..5}
          do
            echo "Generating recipe $i..."
            # Added -L to follow redirects (like www to non-www or trailing slash)
            # Added trailing slash before query params
            RESPONSE=$(curl -s -L "https://bitebase.me/api/cron/generate/?secret=${{ secrets.CRON_SECRET }}&count=1")
            echo "Response: $RESPONSE"
            # Increased sleep for Gemini Free Tier (stay under 15 RPM)
            sleep 12
          done
